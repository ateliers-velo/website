backend:
  name: github
  repo: ateliers-velo/website
  branch: main

media_folder: src/imgs/uploads
public_folder: /imgs/uploads
site_url: https://bum.bike
locale: fr

collections:

  # ─────────────────────────────────────────────────────────────
  # POSTS — All articles (FR & EN together)
  # Tags and layout are inherited from src/content/posts/posts.json
  #
  # Language is determined by filename:
  #   - "My Post.md"     → French (default)
  #   - "My Post.en.md"  → English
  #
  # Bilingual workflow:
  #   1. Create FR post: set Folder to your event slug, write title
  #   2. Create EN post: set Folder to the SAME slug, append .en to filename
  #      (e.g. slug template produces "Title.en.md")
  #
  # Posts in the same subfolder with 2 files are auto-paired as
  # translations by eleventyComputed.js.
  # ─────────────────────────────────────────────────────────────
  - name: posts
    label: "Articles / Posts"
    label_singular: "Article / Post"
    description: >
      All posts (FR & EN). Language is determined by filename:
      "Title.md" = FR, "Title.en.md" = EN.
      To make a bilingual post, create both versions in the same folder.
    folder: src/content/posts
    create: true
    nested:
      depth: 2
      summary: "{{title}}"
    meta:
      path:
        widget: string
        label: "Folder"
        hint: >
          Subfolder name for this post (e.g. "mon-evenement").
          Use the same folder for FR and EN versions to pair them as translations.
          Leave empty for a standalone (FR-only) post.
    extension: md
    format: frontmatter
    fields:
      - { label: "Title / Titre", name: title, widget: string }
      - { label: "Date", name: date, widget: datetime, date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Content / Contenu", name: body, widget: markdown }
      - { label: "Image", name: img, widget: image, required: false, hint: "Main image / Image principale (optional)" }

  # ─────────────────────────────────────────────────────────────
  # ATELIERS — Bike shop pages
  # Most ateliers redirect to external shop URLs
  # ─────────────────────────────────────────────────────────────
  - name: ateliers
    label: "Ateliers"
    label_singular: "Atelier"
    folder: src/content/ateliers
    create: true
    extension: md
    format: frontmatter
    fields:
      - { label: "Nom", name: title, widget: string }
      - { label: "URL de redirection", name: redirect, widget: string, required: false, hint: "URL externe vers le site de l'atelier (laisser vide pour une page interne)" }
      - { label: "Image", name: img, widget: image, required: false }
      - { label: "Logo", name: logo, widget: image, required: false }
      - { label: "Description", name: description, widget: text, required: false }
      - { label: "permalink", name: permalink, widget: hidden, default: false }
      - { label: "tags", name: tags, widget: hidden, default: ateliers }

  # ─────────────────────────────────────────────────────────────
  # PAGES — Static content pages
  # ─────────────────────────────────────────────────────────────
  - name: pages
    label: "Pages"
    label_singular: "Page"
    folder: src/content/pages
    create: true
    extension: md
    format: frontmatter
    fields:
      - { label: "Titre / Title", name: title, widget: string }
      - label: "Langue / Language"
        name: lang
        widget: select
        options:
          - { label: "Français", value: fr }
          - { label: "English", value: en }
        default: fr
      - { label: "Date", name: date, widget: datetime, date_format: "YYYY-MM-DD", time_format: false, required: false }
      - { label: "Description", name: description, widget: text, required: false }
      - label: "Layout"
        name: layout
        widget: select
        options: [basic.html, gallery.html, landing.html, posts-overview.html]
        default: basic.html
      - { label: "Tags", name: tags, widget: list, required: false, hint: "Ex: nav-items, index-pages" }
      - { label: "Contenu / Content", name: body, widget: markdown, required: false }
