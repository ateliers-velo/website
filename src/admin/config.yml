backend:
  name: github
  repo: ateliers-velo/website
  branch: main

media_folder: src/imgs/uploads
public_folder: /imgs/uploads
site_url: https://bum.bike
locale: fr

# ─────────────────────────────────────────────────────────────
# i18n: Sveltia CMS creates paired files per locale.
# With omit_default_locale_from_file_path, FR files have no
# suffix (.md) and EN files get .en.md — matching the existing
# eleventyComputed.js filename-based language detection.
# ─────────────────────────────────────────────────────────────
i18n:
  structure: multiple_files
  locales: [fr, en]
  default_locale: fr
  omit_default_locale_from_file_path: true

collections:

  # ─────────────────────────────────────────────────────────────
  # POSTS — Bilingual articles (in subfolders)
  # path template enables subdirectory file discovery.
  # i18n creates paired FR/EN files in the same folder,
  # which eleventyComputed.js auto-pairs as translations.
  # ─────────────────────────────────────────────────────────────
  - name: posts
    label: "Articles / Posts"
    label_singular: "Article / Post"
    description: >
      Bilingual posts. Each entry has FR + EN tabs.
      Files are stored in subfolders for translation pairing.
    folder: src/content/posts
    create: true
    path: "{{slug}}/{{slug}}"
    i18n: true
    extension: md
    format: frontmatter
    fields:
      - { label: "Title / Titre", name: title, widget: string, i18n: true }
      - { label: "Date", name: date, widget: datetime, date_format: "YYYY-MM-DD", time_format: false, i18n: duplicate }
      - { label: "Content / Contenu", name: body, widget: markdown, i18n: true }
      - { label: "Image", name: img, widget: image, required: false, i18n: duplicate }

  # ─────────────────────────────────────────────────────────────
  # ATELIERS — Bike shop pages
  # Most ateliers redirect to external shop URLs
  # ─────────────────────────────────────────────────────────────
  - name: ateliers
    label: "Ateliers"
    label_singular: "Atelier"
    folder: src/content/ateliers
    create: true
    extension: md
    format: frontmatter
    fields:
      - { label: "Nom", name: title, widget: string, required: false }
      - { label: "URL de redirection", name: redirect, widget: string, required: false, hint: "URL externe vers le site de l'atelier (laisser vide pour une page interne)" }
      - { label: "Image", name: img, widget: image, required: false }
      - { label: "Logo", name: logo, widget: image, required: false }
      - { label: "Description", name: description, widget: text, required: false }
      - { label: "permalink", name: permalink, widget: hidden, default: false }
      - { label: "tags", name: tags, widget: hidden, default: ateliers }

  # ─────────────────────────────────────────────────────────────
  # PAGES — Static content pages (bilingual, in subfolders)
  # .njk template pages (map, all posts, all shops) are not
  # managed here — only .md content pages.
  # ─────────────────────────────────────────────────────────────
  - name: pages
    label: "Pages"
    label_singular: "Page"
    folder: src/content/pages
    create: true
    path: "{{slug}}/{{slug}}"
    i18n: true
    extension: md
    format: frontmatter
    fields:
      - { label: "Titre / Title", name: title, widget: string, i18n: true }
      - { label: "Date", name: date, widget: datetime, date_format: "YYYY-MM-DD", time_format: false, required: false, i18n: duplicate }
      - { label: "Description", name: description, widget: text, required: false, i18n: true }
      - label: "Layout"
        name: layout
        widget: select
        options: [basic.html, gallery.html, landing.html, posts-overview.html]
        default: basic.html
        i18n: duplicate
      - { label: "Tags", name: tags, widget: list, required: false, hint: "Ex: nav-items, index-pages", i18n: duplicate }
      - { label: "Contenu / Content", name: body, widget: markdown, required: false, i18n: true }
